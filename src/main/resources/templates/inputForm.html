<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<form action="#" th:action="@{/}" th:object="${inputForm}" method="post">
  <table>
    <tr>
      <h1>Tillgungsplan Rechner</h1>
      <td>Darlehensbetrag:</td>
      <td><label>
        <input type="text" th:field="*{darlehensbetrag}" />
      </label></td>
     <!-- <td th:if="${#fields.hasErrors('darlehensbetrag')}" th:errors="*{darlehensbetrag}">Darlehensbetrag Fehler</td> -->
    </tr>
    <tr>
      <td>Zinssatz:</td>
      <td><label>
        <input type="text" th:field="*{zinssatz}" />
      </label></td>
     <!-- <td th:if="${#fields.hasErrors('zinssatz')}" th:errors="*{zinssatz}">Zinssatz Fehler</td> -->
    </tr>
    <tr>
      <td>Anfängliche Tilgung:</td>
      <td><label>
        <input type="text" th:field="*{anfaenglichenTilgung}" />
      </label></td>
      <td th:if="${#fields.hasErrors('anfaenglichenTilgung')}" th:errors="*{anfaenglichenTilgung}">Anfängliche Tilgung Fehler</td>
    </tr>
    <tr>
      <td>Zinsbindung:</td>
      <td><label>
        <input type="text" th:field="*{zinsbindung}" />
      </label></td>
      <td th:if="${#fields.hasErrors('zinsbindung')}" th:errors="*{zinsbindung}">Zinsbindung Fehler</td>
    </tr>
    <tr>
      <td>
        <button type="submit" value="submit">Submit</button>
      </td>
    </tr>
  </table>
</form>
</body>
</html>
