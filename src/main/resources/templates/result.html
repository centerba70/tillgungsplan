<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <style>
        #tilgungsplanList {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }

        #tilgungsplanList td, #tilgungsplanList th {
            border: 1px solid #ddd;
            padding: 8px;
        }

        #tilgungsplanList tr:nth-child(even){background-color: #f2f2f2;}

        #tilgungsplanList tr:hover {background-color: #ddd;}

        #tilgungsplanList th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #7a8193;
            color: white;
        }
    </style>
    <title th:text="${@environment.getProperty('messages.result.title')}"></title>
</head>
<body>
<div th:if="${ not#lists.isEmpty(tilgungsplanList)}">
    <table id="tilgungsplanList">
        <tr>
            <thead>
            <th>Datum</th>
            <th>Restschuld</th>
            <th>Zinsen</th>
            <th>Tilgung(+) / Auszahlung(-)</th>
            <th>Rate</th>
            </thead>
        </tr>
        <tbody>
        <tr th:each="tillgungsplan : ${tilgungsplanList}">
            <td th:unless="${ tillgungsplanStat.last}" th:text="${tillgungsplan.datum}"></td>
            <td th:if="${tillgungsplanStat.last}" th:text="${@environment.getProperty('messages.result.last_element')}"></td>
            <td th:text="${#numbers.formatCurrency(tillgungsplan.restschuld)}"></td>
            <td th:text="${#numbers.formatCurrency(tillgungsplan.zinsen)}"></td>
            <td th:text="${#numbers.formatCurrency(tillgungsplan.tilgung)}"></td>
            <td th:text="${#numbers.formatCurrency(tillgungsplan.rate)}"></td>
        </tr>
        </tbody>
    </table>
</div>
<div th:if="${ #lists.isEmpty(tilgungsplanList)}" th:text="${@environment.getProperty('messages.result.no_elements')}">
</div>
<br><br>
<br><br>
<a href="/" th:text="${@environment.getProperty('messages.result.back_to_home_page')}"></a>
</body>
</html>
