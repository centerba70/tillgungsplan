<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <style>
        #tillgungsplanList {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }

        #tillgungsplanList td, #tillgungsplanList th {
            border: 1px solid #ddd;
            padding: 8px;
        }

        #tillgungsplanList tr:nth-child(even){background-color: #f2f2f2;}

        #tillgungsplanList tr:hover {background-color: #ddd;}

        #tillgungsplanList th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #7a8193;
            color: white;
        }
    </style>
    <title>Result Page</title>
</head>
<body>
<div th:if="${ not#lists.isEmpty(tillgungsplanList)}">
    <table id="tillgungsplanList">
        <tr>
            <thead>
            <th>Datum</th>
            <th>Restschuld</th>
            <th>Zinsen</th>
            <th>Tilgung(+) / Auszahlung(-)</th>
            <th>Rate</th>
            </thead>
        </tr>
        <tbody>
        <tr th:each="tillgungsplan : ${tillgungsplanList}">
            <td th:text="${tillgungsplan.datum}"></td>
            <td th:text="${tillgungsplan.restschuld} + ' €'"></td>
            <td th:text="${tillgungsplan.zinsen} + ' €'"></td>
            <td th:text="${tillgungsplan.tilgung} + ' €'"></td>
            <td th:text="${tillgungsplan.rate} + ' €'"></td>
        </tr>
        </tbody>
    </table>
</div>
<div th:if="${ #lists.isEmpty(tillgungsplanList)}">
    Es gibt kein Ergebnis zu zeigen. Bitte versuch es noch mal.
</div>
<br><br>
<br><br>
<a href="/">Zurück zum Home Page</a>
</body>
</html>
